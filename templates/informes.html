<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" href="{{url_for('static', filename='img/icon.png')}}" type="image/x-icon">
    <title>Informes</title>
    <style>
        body {
            background-color: #f8f9fa;
            padding: 20px 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-header {
            border-bottom: 2px solid #0d6efd;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .btn-submit {
            background-color: #0d6efd;
            color: white;
            padding: 10px 30px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .required:after {
            content: " *";
            color: red;
        }

        .form-label {
            font-weight: 500;
        }

        .service-description {
            font-size: 0.9rem;
            color: #6c757d;
            margin-top: 5px;
        }

        .hidden {
            display: none;
        }

        .capacity-option {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body>


    <div class="container">

        <div class="left">
            <a href="{{ url_for('index') }}" class="btn btn-primary btn-inicio d-flex align-items-center gap-2 shadow">
                <i class="bi bi-arrow-left"></i>
                <span class="btn-inicio-text">Inicio</span>
            </a>
        </div>


        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="form-container">

                    <div class="form-header">
                        <h2 class="text-center text-primary">Solicitar Información de Espacios</h2>
                        <p class="text-center text-muted">Complete todos los campos para solicitar información</p>
                    </div>

                    <form action="/reservationForm" id="reservationForm" method="post">
                        <!-- Información Personal -->
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="firstName" class="form-label required">Nombre</label>
                                <input type="text" class="form-control" name="firstName" id="firstName" required>
                            </div>
                            <div class="col-md-6">
                                <label for="lastName" class="form-label required">Apellido</label>
                                <input type="text" class="form-control" name="lastName" id="lastName" required>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="phone" class="form-label required">Número de Teléfono</label>
                                <input type="tel" class="form-control" name="phone" id="phone" required>
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label required">Correo Electrónico</label>
                                <input type="email" class="form-control" name="email" id="email" required>
                            </div>
                        </div>

                        <!-- Tipo de Servicio -->
                        <div class="mb-4">
                            <label for="serviceType" class="form-label required">Tipo de Servicio</label>
                            <select class="form-select" name="serviceType" id="serviceType" required>
                                <option value="" selected disabled>Seleccione un tipo de servicio</option>
                                <option value="hotDesk">Hot Desk</option>
                                <option value="privateOffice">Oficina Privada</option>
                                <option value="meetingRoom">Sala de Juntas</option>
                                <option value="trainingRoom">Sala de Capacitación</option>
                                <option value="podcast">Podcast</option>
                                <option value="lounge">Lounge</option>
                                <option value="specialEvent">Evento Especial</option>
                            </select>
                            <div id="serviceDescription" class="service-description mt-2">
                                <!-- Aquí se mostrará la descripción del servicio seleccionado -->
                            </div>
                        </div>

                        <!-- Capacidad para Oficina Privada (oculto por defecto) -->
                        <div id="capacitySection" class="mb-4 hidden">
                            <label for="officeCapacity" class="form-label required">Capacidad de la Oficina</label>
                            <select name="officeCapacity" class="form-select" id="officeCapacity">
                                <option value="" selected disabled>Seleccione el número de personas</option>
                                <option value="2 a 5">2-5 personas</option>
                                <option value="5 a 8">5-8 personas</option>
                                <option value="8 a 12">8-12 personas</option>
                                <option value="12 o más">12 o más personas</option>
                            </select>
                            <div id="capacityDescription" class="service-description mt-2">
                                <!-- Aquí se mostrará la descripción de la capacidad seleccionada -->
                            </div>
                        </div>

                        <!-- Información de la Empresa -->
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="companyName" class="form-label">Nombre de la Empresa</label>
                                <input type="text" class="form-control" name="companyName" id="companyName">
                            </div>
                            <div class="col-md-6">
                                <label for="businessType" class="form-label">Giro</label>
                                <input type="text" class="form-control" name="businessType" id="businessType">
                            </div>
                        </div>

                        <!-- Fecha Aproximada -->
                        <div class="mb-4">
                            <label for="startDate" class="form-label required">Fecha Aproximada de Inicio</label>
                            <input type="date" class="form-control" name="startDate" id="startDate" required>
                        </div>

                        <!-- Notas Adicionales -->
                        <div class="mb-4">
                            <label for="additionalNotes" class="form-label">Notas Adicionales</label>
                            <textarea class="form-control" name="additionalNotes" id="additionalNotes" rows="4"
                                placeholder="Agregue cualquier información adicional que considere relevante..."></textarea>
                        </div>

                        <!-- Botón de Envío -->
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="submit" class="btn btn-submit">Enviar Solicitud</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Descripciones de los servicios
        const serviceDescriptions = {
            hotDesk: "Espacio de trabajo flexible en un área compartida, ideal para trabajadores independientes o nómadas digitales.",
            privateOffice: "Oficina privada completamente equipada para reuniones y trabajo concentrado.",
            meetingRoom: "Sala equipada para reuniones de negocios, presentaciones y sesiones de trabajo en equipo.",
            trainingRoom: "Espacio amplio diseñado para capacitaciones, talleres y sesiones educativas.",
            podcast: "Estudio acondicionado acústicamente para grabación de podcasts y contenido de audio.",
            lounge: "Área de descanso y networking con ambiente relajado para reuniones informales.",
            specialEvent: "Espacio versátil para eventos corporativos, lanzamientos de productos y celebraciones."
        };

        // Descripciones de las capacidades
        const capacityDescriptions = {
            "2-5": "Oficina compacta ideal para equipos pequeños o trabajo individual con espacio para visitas ocasionales.",
            "5-8": "Oficina mediana con espacio suficiente para un equipo de trabajo y reuniones internas.",
            "8-12": "Oficina amplia con áreas de trabajo y reunión, ideal para departamentos pequeños.",
            "12+": "Oficina ejecutiva con múltiples áreas de trabajo, ideal para equipos grandes o gerenciales."
        };

        // Elementos del DOM
        const serviceTypeSelect = document.getElementById('serviceType');
        const serviceDescriptionElement = document.getElementById('serviceDescription');
        const capacitySection = document.getElementById('capacitySection');
        const officeCapacitySelect = document.getElementById('officeCapacity');
        const capacityDescriptionElement = document.getElementById('capacityDescription');

        // Mostrar/ocultar sección de capacidad según el servicio seleccionado
        serviceTypeSelect.addEventListener('change', function () {
            const selectedService = this.value;

            // Mostrar descripción del servicio
            if (selectedService && serviceDescriptions[selectedService]) {
                serviceDescriptionElement.textContent = serviceDescriptions[selectedService];
            } else {
                serviceDescriptionElement.textContent = '';
            }

            // Mostrar u ocultar sección de capacidad
            if (selectedService === 'privateOffice') {
                capacitySection.classList.remove('hidden');
                officeCapacitySelect.required = true;
            } else {
                capacitySection.classList.add('hidden');
                officeCapacitySelect.required = false;
                officeCapacitySelect.value = '';
                capacityDescriptionElement.textContent = '';
            }
        });

        // Mostrar descripción de la capacidad seleccionada
        officeCapacitySelect.addEventListener('change', function () {
            const selectedCapacity = this.value;

            if (selectedCapacity && capacityDescriptions[selectedCapacity]) {
                capacityDescriptionElement.textContent = capacityDescriptions[selectedCapacity];
            } else {
                capacityDescriptionElement.textContent = '';
            }
        });


    </script>
</body>

</html>
