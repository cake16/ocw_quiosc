<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitantes</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f8f9fa;
        }

        /* 🔹 Contenedor principal dividido en 3 columnas */
        .layout {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: flex-start;
            padding: 0.5rem 1rem;
            gap: 1rem;
        }

        /* 🔹 Secciones izquierda, centro, derecha */
        .left,
        .center,
        .right {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .left {
            justify-content: flex-start;
        }

        .right {
            justify-content: flex-end;
        }

        /* 🔹 Formulario centrado sin márgenes */
        .form-container {
            width: 100%;
            max-width: 700px;
        }

        .card {
            margin-top: 0 !important;
        }

        .card-header {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
        }

        /* 🔹 Ajuste visual opcional */
        .top-space {
            margin-top: -5px;
        }
    </style>
</head>

<body>

    <div class="layout">

        <!-- 🔹 Sección izquierda -->
        <div class="left">
            <a href="{{ url_for('index') }}"
                class="btn btn-primary btn-lg d-flex align-items-center gap-2 shadow btn-back-paqueteria">
                <i class="bi bi-arrow-left"></i>
                <span>Inicio</span>
            </a>
        </div>

        <!-- ⚪ Sección central (formulario) -->
        <div class="center">
            <div class="form-container top-space">

                <div class="card shadow-lg" data-aos="fade-up">
                    <div class="d-flex justify-content-center align-items-center my-3">
                        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo OCW Kiosko"
                            class="img-fluid" style="max-height: 50px;">
                    </div>

                    <div class="card-header bg-secondary text-white text-center">
                        <h4>Registro de Visitantes</h4>
                    </div>

                    <div class="card-body">
                        <!-- 🔹 Tu formulario original aquí -->
                        <form>
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" id="nombre" class="form-control" placeholder="Nombre del visitante">
                            </div>
                            <div class="text-center">
                                <button class="btn btn-success">Registrar</button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>

        <!-- 🔹 Sección derecha -->
        <div class="right">
            <a href="/registrar_salida" class="btn btn-danger btn-lg shadow">
                <i class="bi bi-box-arrow-right"></i> Registrar Salida
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>

</body>
</html>
