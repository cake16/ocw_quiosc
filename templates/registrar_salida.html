<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Salida - Sistema de Acceso</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #7e8e92 0%, #698890 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .card-header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 2rem;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .alert {
            border-radius: 10px;
            border: none;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card">
                    <div class="card-header text-center">
                        <div class="icon-container">
                            <i class="bi bi-door-open-fill text-white" style="font-size: 2.5rem;"></i>
                        </div>
                        <h3 class="mb-0">Registro de Salida</h3>
                        <p class="mb-0 mt-2 opacity-75">Sistema de Control de Acceso</p>
                    </div>

                    <div class="card-body p-4">
                        <form id="formSalida">
                            <div class="mb-4">
                                <label for="gafete" class="form-label fw-semibold">
                                    <i class="bi bi-person-badge me-2"></i>Número de Gafete
                                </label>
                                <input type="number" class="form-control form-control-lg" id="gafete" required
                                    placeholder="Ingrese el número de gafete" min="1">
                                <div class="form-text text-muted">
                                    Ingrese el número asignado en su gafete de identificación
                                </div>
                            </div>

                            <button type="submit" class="btn btn-danger w-100 py-3 fw-bold">
                                <i class="bi bi-box-arrow-right me-2"></i>
                                Registrar Salida
                            </button>

                            <div id="resultado" class="mt-4"></div>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById("formSalida").addEventListener("submit", async (e) => {
            e.preventDefault();

            const gafete = document.getElementById("gafete").value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;

            // Mostrar estado de carga
            submitBtn.innerHTML = '<i class="bi bi-hourglass-split me-2"></i>Procesando...';
            submitBtn.disabled = true;

            try {
                const response = await fetch("/registrar_salida1", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ gafete })
                });

                const data = await response.json();

                const resultadoDiv = document.getElementById("resultado");
                if (data.ok) {
                    resultadoDiv.innerHTML = `
                        <div class="alert alert-success d-flex align-items-center">
                            <i class="bi bi-check-circle-fill me-2 fs-4"></i>
                            <div>
                                <h5 class="alert-heading mb-1">¡Salida Registrada!</h5>
                                ${data.msg}
                            </div>
                            <div class="countdown">
                                Redirigiendo al inicio en <span id="countdown">3</span> segundos...
                            </div>
                        </div>
                    `;
                    // Iniciar cuenta regresiva para redirección
                    let countdown = 3;
                    const countdownElement = document.getElementById('countdown');
                    const countdownInterval = setInterval(() => {
                        countdown--;
                        countdownElement.textContent = countdown;

                        if (countdown <= 0) {
                            clearInterval(countdownInterval);
                            window.location.href = "{{url_for('index')}}"; // Redirigir al index
                        }
                    }, 1000);

                    // Limpiar formulario
                    document.getElementById("formSalida").reset();
                } else {
                    resultadoDiv.innerHTML = `
                        <div class="alert alert-danger d-flex align-items-center">
                            <i class="bi bi-exclamation-triangle-fill me-2 fs-4"></i>
                            <div>
                                <h5 class="alert-heading mb-1">Error en Registro</h5>
                                ${data.msg}
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById("resultado").innerHTML = `
                    <div class="alert alert-danger">
                        <i class="bi bi-x-circle-fill me-2"></i>
                        Error de conexión. Intente nuevamente.
                    </div>
                `;
            } finally {
                // Restaurar botón
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        // Efecto de foco automático en el input
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('gafete').focus();
        });
    </script>
</body>

</html>
