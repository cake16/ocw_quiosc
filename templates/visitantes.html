    <script>

        // Función para reproducir un sonido de éxito
        function reproducirSonidoExito() {
            try {
                // Crear contexto de audio
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();

                // Crear oscilador para un tono agradable
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                // Conectar nodos
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                // Configurar sonido (tono de éxito)
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioContext.currentTime); // La5
                oscillator.frequency.setValueAtTime(1174.66, audioContext.currentTime + 0.1); // Re6

                // Control de volumen (evitar que suene muy fuerte)
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

                // Reproducir
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.3);

                console.log('🔊 Sonido de éxito reproducido');
            } catch (error) {
                console.log('⚠️ No se pudo reproducir el sonido:', error);
            }
        }

    </script>


    <script>
        AOS.init();


        window.addEventListener('DOMContentLoaded', () => {
            const fechaInput = document.getElementById('fecha');

            const hoy = new Date();
            const anio = hoy.getFullYear();
            const mes = (hoy.getMonth() + 1).toString().padStart(2, '0');
            const dia = hoy.getDate().toString().padStart(2, '0');

            fechaInput.value = `${anio}-${mes}-${dia}`;
        });


        window.addEventListener('DOMContentLoaded', (event) => {
            const ahora = new Date();
            const hora = ahora.toTimeString().split(' ')[0]; // Formato HH:MM:SS
            document.getElementById('horaEntrada').value = hora;
        });


        let horaSalida = "";

        function registrarSalida() {
            const now = new Date();
            const hora = now.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('horaSalida').value = hora;
        }


    </script>



    <script>
        const btnCamara = document.getElementById('abrirCamara');
        const inputFoto = document.getElementById('fotoTomada');
        const preview = document.getElementById('previewFoto');

        // Abrir la vista de cámara en ventana separada
        btnCamara.addEventListener('click', () => {
            const camWindow = window.open('/foto', 'camaraWindow', 'width=800,height=600');
        });

        // Escuchar el mensaje que viene desde la ventana de cámara
        window.addEventListener('message', (event) => {
            if (event.data.type === 'fotoTomada') {
                const base64Image = event.data.image;
                inputFoto.value = base64Image;
                btnCamara.style.display = 'none';
                preview.innerHTML = `<img src="${base64Image}" class="img-thumbnail " style="max-width:200px;">`;
                document.getElementById("alertaFoto").classList.add("d-none");
            }
        });


    </script>


    <script>
        const form = document.getElementById("visitanteForm");
        const toastEl = document.getElementById("toastExito");
        const checkPrivacidad = document.getElementById("checkPrivacidad");
        const toastBootstrap = new bootstrap.Toast(toastEl, {
            autohide: false
        });

        form.addEventListener("submit", function (e) {

            const fotoTomada = document.getElementById("fotoTomada").value;
            const alerta = document.getElementById("alertaFoto");
            const mensaje = document.getElementById("mensajeAlertaFoto");

            if (!fotoTomada || fotoTomada.trim() === "") {
                e.preventDefault();

                mensaje.textContent = currentLanguage === 'es'
                    ? "Debes tomar una fotografía antes de registrar al visitante."
                    : "You must take a photo before registering the visitor.";

                alerta.classList.remove("d-none");

                return;
            }

            if (!checkPrivacidad.checked) {
                e.preventDefault();
                alert(currentLanguage === 'es'
                    ? "Debes aceptar el aviso de privacidad."
                    : "You must accept the privacy notice.");
                return;
            }

            e.preventDefault();
            // REPRODUCIR SONIDO DE ÉXITO
            reproducirSonidoExito();
            toastBootstrap.show();

            // Esperar un poco antes de enviar el formulario para que se vea el toast
            setTimeout(() => {
                form.submit();
            }, 1500);

        });
    </script>

    <script>
        // Personalizar mensaje de validación según el idioma
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('visitanteForm');

            form.querySelectorAll('input, textarea').forEach(field => {
                field.addEventListener('invalid', function (e) {
                    e.preventDefault(); // Evita el mensaje por defecto

                    // Encuentra el primer campo no válido
                    const primerCampoInvalido = form.querySelector(":invalid");

                    if (primerCampoInvalido) {
                        // Desplaza la vista hasta el campo no válido
                        primerCampoInvalido.scrollIntoView({ behavior: "smooth", block: "center" });

                        // Aplica un borde o sombra para destacarlo (opcional)
                        primerCampoInvalido.classList.add("is-invalid");

                        // Quita el borde cuando el usuario empieza a escribir
                        primerCampoInvalido.addEventListener("input", () => {
                            primerCampoInvalido.classList.remove("is-invalid");
                            primerCampoInvalido.setCustomValidity("");
                        });
                    }


                    // Traducción personalizada
                    const mensajes = {
                        es: "Por favor, llena este campo.",
                        en: "Please fill out this field."
                    };

                    this.setCustomValidity(mensajes[currentLanguage]);

                });

                // Limpiar el mensaje cuando el usuario empieza a escribir
                field.addEventListener('input', function () {
                    this.setCustomValidity('');
                });
            });
        });
    </script>

    <script>
        // ========== GUARDAR FORMULARIO ANTES DE IR AL AVISO ==========
        function guardarFormularioAntesDeSalir() {
            const formData = {
                nombre: document.getElementById('nombre')?.value || '',
                apePaterno: document.getElementById('apePaterno')?.value || '',
                visitado: document.getElementById('visitado')?.value || '',
                oficina: document.getElementById('oficina')?.value || '',
                numGafe: document.getElementById('numGafe')?.value || '',
                fotoTomada: document.getElementById('fotoTomada')?.value || '',
                ruta_foto: document.getElementById('ruta_foto')?.value || '',
                previewHTML: document.getElementById('previewFoto')?.innerHTML || ''
            };

            localStorage.setItem('formularioVisitanteTemp', JSON.stringify(formData));
            console.log('✅ Formulario guardado antes de ir al aviso de privacidad');
        }

        // ========== RESTAURAR FORMULARIO AL REGRESAR ==========
        function restaurarFormularioDespuesDeRegresar() {
            const datosGuardados = localStorage.getItem('formularioVisitanteTemp');

            if (datosGuardados) {
                try {
                    const formData = JSON.parse(datosGuardados);

                    if (document.getElementById('nombre'))
                        document.getElementById('nombre').value = formData.nombre || '';
                    if (document.getElementById('apePaterno'))
                        document.getElementById('apePaterno').value = formData.apePaterno || '';
                    if (document.getElementById('visitado'))
                        document.getElementById('visitado').value = formData.visitado || '';
                    if (document.getElementById('oficina'))
                        document.getElementById('oficina').value = formData.oficina || '';
                    if (document.getElementById('numGafe'))
                        document.getElementById('numGafe').value = formData.numGafe || '';

                    if (formData.fotoTomada) {
                        document.getElementById('fotoTomada').value = formData.fotoTomada;
                        document.getElementById('ruta_foto').value = formData.ruta_foto || '';

                        const btnCamara = document.getElementById('abrirCamara');
                        const preview = document.getElementById('previewFoto');

                        if (btnCamara) btnCamara.style.display = 'none';
                        if (preview) preview.innerHTML = formData.previewHTML ||
                            `<img src="${formData.fotoTomada}" class="img-thumbnail" style="max-width:200px;">`;
                    }

                    console.log('✅ Formulario restaurado después del aviso de privacidad');
                    localStorage.removeItem('formularioVisitanteTemp');
                } catch (error) {
                    console.error('❌ Error al restaurar el formulario:', error);
                }
            }
        }

        // ========== MODIFICAR EL ENLACE DEL AVISO DE PRIVACIDAD ==========
        document.addEventListener('DOMContentLoaded', () => {
            // Restaurar formulario al cargar
            restaurarFormularioDespuesDeRegresar();

            // Agregar el evento al enlace del aviso (si existe)
            const linkPrivacidad = document.querySelector('a[href*="priv"]');
            if (linkPrivacidad) {
                linkPrivacidad.addEventListener('click', guardarFormularioAntesDeSalir);
            }

            // Marcar checkbox si viene de aceptar
            const acepto = localStorage.getItem("aceptoPrivacidad");
            if (acepto === "true") {
                const check = document.getElementById("checkPrivacidad");
                if (check) check.checked = true;
                localStorage.removeItem("aceptoPrivacidad");
            }
        });
    </script>
